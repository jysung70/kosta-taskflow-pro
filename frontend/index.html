<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow Pro</title>

  <!-- FOUC 방지: 스크립트 로드 전 테마 즉시 적용 -->
  <script>
    (function () {
      const saved = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (saved === 'dark' || (!saved && prefersDark)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <link rel="stylesheet" href="style.css">
</head>

<body class="font-sans bg-gray-100 dark:bg-gray-900 min-h-screen transition-colors duration-200">

  <!-- 헤더 -->
  <header class="sticky top-0 z-10 backdrop-blur-md bg-white/80 dark:bg-gray-800/80 border-b border-gray-200 dark:border-gray-700">
    <div class="max-w-2xl mx-auto px-4 h-14 flex items-center justify-between">
      <h1 class="text-base font-semibold text-gray-900 dark:text-white tracking-tight">TaskFlow Pro</h1>
      <button id="theme-toggle"
        class="min-h-[44px] min-w-[44px] flex items-center justify-center rounded-xl text-xl
               hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors"
        aria-label="테마 전환">
        <span id="theme-icon"></span>
      </button>
    </div>
  </header>

  <main class="max-w-2xl mx-auto px-4 py-6 space-y-4">

    <!-- 업무 추가 폼 -->
    <section class="bg-white/80 dark:bg-gray-800/80 backdrop-blur-md rounded-xl shadow-lg p-4">
      <h2 class="text-sm font-semibold text-gray-500 dark:text-gray-400 mb-3">새 업무 추가</h2>
      <form id="add-form" class="space-y-2" novalidate>
        <input id="input-title" type="text" maxlength="200" placeholder="업무 제목 (필수)"
          class="w-full min-h-[44px] px-3 py-2 rounded-xl border border-gray-200 dark:border-gray-600
                 bg-white dark:bg-gray-700 text-gray-900 dark:text-white placeholder-gray-400
                 focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
        <div class="flex gap-2">
          <select id="input-status"
            class="flex-1 min-h-[44px] px-3 py-2 rounded-xl border border-gray-200 dark:border-gray-600
                   bg-white dark:bg-gray-700 text-gray-900 dark:text-white
                   focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
            <option value="todo">Todo</option>
            <option value="in_progress">In Progress</option>
            <option value="done">Done</option>
          </select>
          <input id="input-due-at" type="datetime-local"
            class="flex-1 min-h-[44px] px-3 py-2 rounded-xl border border-gray-200 dark:border-gray-600
                   bg-white dark:bg-gray-700 text-gray-900 dark:text-white
                   focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
        </div>
        <p id="add-error" class="text-red-500 text-xs"></p>
        <button type="submit"
          class="w-full min-h-[44px] bg-blue-500 hover:bg-blue-600 active:bg-blue-700
                 text-white font-medium rounded-xl transition-colors">
          추가
        </button>
      </form>
    </section>

    <!-- 업무 목록 -->
    <section id="task-list" class="space-y-2"></section>
    <p id="empty-msg" class="text-center text-gray-400 dark:text-gray-600 py-16 text-sm"></p>

  </main>

  <!-- 수정 모달 -->
  <div id="modal-overlay"
    class="fixed inset-0 z-50 bg-black/40 backdrop-blur-sm items-center justify-center p-4">
    <div class="w-full max-w-md bg-white dark:bg-gray-800 rounded-xl shadow-lg p-5 space-y-3">
      <h3 class="font-semibold text-gray-900 dark:text-white">업무 수정</h3>
      <input id="modal-title" type="text" maxlength="200" placeholder="업무 제목"
        class="w-full min-h-[44px] px-3 py-2 rounded-xl border border-gray-200 dark:border-gray-600
               bg-white dark:bg-gray-700 text-gray-900 dark:text-white
               focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
      <textarea id="modal-description" rows="3" placeholder="설명 (선택)"
        class="w-full px-3 py-2 rounded-xl border border-gray-200 dark:border-gray-600
               bg-white dark:bg-gray-700 text-gray-900 dark:text-white
               focus:outline-none focus:ring-2 focus:ring-blue-500 transition resize-none"></textarea>
      <div class="flex gap-2">
        <select id="modal-status"
          class="flex-1 min-h-[44px] px-3 py-2 rounded-xl border border-gray-200 dark:border-gray-600
                 bg-white dark:bg-gray-700 text-gray-900 dark:text-white
                 focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
          <option value="todo">Todo</option>
          <option value="in_progress">In Progress</option>
          <option value="done">Done</option>
        </select>
        <input id="modal-due-at" type="datetime-local"
          class="flex-1 min-h-[44px] px-3 py-2 rounded-xl border border-gray-200 dark:border-gray-600
                 bg-white dark:bg-gray-700 text-gray-900 dark:text-white
                 focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
      </div>
      <p id="modal-error" class="text-red-500 text-xs"></p>
      <div class="flex gap-2">
        <button id="modal-cancel"
          class="flex-1 min-h-[44px] rounded-xl border border-gray-200 dark:border-gray-600
                 text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700 transition">
          취소
        </button>
        <button id="modal-save"
          class="flex-1 min-h-[44px] bg-blue-500 hover:bg-blue-600 text-white font-medium rounded-xl transition-colors">
          저장
        </button>
      </div>
    </div>
  </div>

  <!-- 삭제 확인 다이얼로그 -->
  <div id="delete-overlay"
    class="fixed inset-0 z-50 bg-black/40 backdrop-blur-sm items-center justify-center p-4">
    <div class="w-full max-w-sm bg-white dark:bg-gray-800 rounded-xl shadow-lg p-5 space-y-4">
      <p class="text-gray-900 dark:text-white font-medium">이 업무를 삭제할까요?</p>
      <div class="flex gap-2">
        <button id="delete-cancel"
          class="flex-1 min-h-[44px] rounded-xl border border-gray-200 dark:border-gray-600
                 text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700 transition">
          취소
        </button>
        <button id="delete-confirm"
          class="flex-1 min-h-[44px] bg-red-500 hover:bg-red-600 text-white font-medium rounded-xl transition-colors">
          삭제
        </button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
